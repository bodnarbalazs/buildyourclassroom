name: Deploy to AKS

on:
  push:
    tags: ['v*']

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build -t $ACR_LOGIN_SERVER/api:${{ steps.version.outputs.tag }} -f docker/api.Dockerfile .
          docker push $ACR_LOGIN_SERVER/api:${{ steps.version.outputs.tag }}

      - name: Build and push frontend image
        run: |
          docker build -t $ACR_LOGIN_SERVER/frontend:${{ steps.version.outputs.tag }} -f docker/frontend.Dockerfile .
          docker push $ACR_LOGIN_SERVER/frontend:${{ steps.version.outputs.tag }}

      - name: Build and push microservice image
        run: |
          docker build -t $ACR_LOGIN_SERVER/microservice:${{ steps.version.outputs.tag }} -f docker/microservice.Dockerfile src/microservices/microservice
          docker push $ACR_LOGIN_SERVER/microservice:${{ steps.version.outputs.tag }}

      - name: Build and push worker image
        run: |
          docker build -t $ACR_LOGIN_SERVER/worker:${{ steps.version.outputs.tag }} -f docker/worker.Dockerfile src/microservices/microservice
          docker push $ACR_LOGIN_SERVER/worker:${{ steps.version.outputs.tag }}

      - name: Install Aspire CLI
        run: curl -sSL https://aspire.dev/install.sh | bash

      - name: Generate Kubernetes manifests
        run: aspire publish --project src/backend/Hackathon.AppHost -o k8s/

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/microservice --timeout=120s
          kubectl rollout status deployment/worker --timeout=120s
