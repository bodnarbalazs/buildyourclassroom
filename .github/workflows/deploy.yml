name: Deploy to AKS

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        run: docker login ${{ secrets.ACR_REGISTRY }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/api:${{ steps.version.outputs.tag }} -f docker/api.Dockerfile .
          docker push ${{ secrets.ACR_REGISTRY }}/api:${{ steps.version.outputs.tag }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/frontend:${{ steps.version.outputs.tag }} -f docker/frontend.Dockerfile .
          docker push ${{ secrets.ACR_REGISTRY }}/frontend:${{ steps.version.outputs.tag }}

      - name: Build and push microservice image
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/microservice:${{ steps.version.outputs.tag }} -f docker/microservice.Dockerfile src/microservices/microservice
          docker push ${{ secrets.ACR_REGISTRY }}/microservice:${{ steps.version.outputs.tag }}

      - name: Build and push worker image
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/worker:${{ steps.version.outputs.tag }} -f docker/worker.Dockerfile src/microservices/microservice
          docker push ${{ secrets.ACR_REGISTRY }}/worker:${{ steps.version.outputs.tag }}

      - name: Deploy to Kubernetes
        run: |
          export TAG=${{ steps.version.outputs.tag }}
          export ACR_REGISTRY=${{ secrets.ACR_REGISTRY }}
          export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          export RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          # export AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          # export AZURE_OPENAI_KEY=${{ secrets.AZURE_OPENAI_KEY }}
          # export AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          for f in k8s/*.yaml; do envsubst < "$f" | kubectl apply -f -; done

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/microservice --timeout=120s
          kubectl rollout status deployment/add-numbers-worker --timeout=120s
          kubectl rollout status deployment/analyze-snapshot-worker --timeout=120s
