name: Deploy to AKS

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/bodnarbalazs/buildyourclassroom

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/api:${{ steps.version.outputs.tag }} -f docker/api.Dockerfile .
          docker push ${{ env.IMAGE_PREFIX }}/api:${{ steps.version.outputs.tag }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.version.outputs.tag }} -f docker/frontend.Dockerfile .
          docker push ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.version.outputs.tag }}

      - name: Build and push microservice image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/microservice:${{ steps.version.outputs.tag }} -f docker/microservice.Dockerfile src/microservices/microservice
          docker push ${{ env.IMAGE_PREFIX }}/microservice:${{ steps.version.outputs.tag }}

      - name: Build and push worker image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/worker:${{ steps.version.outputs.tag }} -f docker/worker.Dockerfile src/microservices/microservice
          docker push ${{ env.IMAGE_PREFIX }}/worker:${{ steps.version.outputs.tag }}

      - name: Create API secrets
        run: |
          kubectl create secret generic api-secrets \
            --from-literal=secrets.json='{"JwtSettings":{"SecretKey":"${{ secrets.SECRETS_JWT_KEY }}"},"Hashing":{"Pepper":"${{ secrets.SECRETS_HASHING_PEPPER }}"}}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          export TAG=${{ steps.version.outputs.tag }}
          export IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
          export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          export RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          export AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          export AZURE_OPENAI_KEY=${{ secrets.AZURE_OPENAI_KEY }}
          export AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          export AZURE_OPENAI_CHAT_DEPLOYMENT=${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT_NAME }}
          export AZURE_OPENAI_WHISPER_DEPLOYMENT=${{ secrets.AZURE_OPENAI_WHISPER_DEPLOYMENT_NAME }}          
          for f in k8s/*.yaml; do envsubst < "$f" | kubectl apply -f -; done

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api --timeout=120s &
          kubectl rollout status deployment/frontend --timeout=120s &
          kubectl rollout status deployment/microservice --timeout=120s &
          kubectl rollout status deployment/add-numbers-worker --timeout=120s &
          kubectl rollout status deployment/analyze-snapshot-worker --timeout=120s &
          wait
