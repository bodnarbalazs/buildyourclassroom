apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ${ACR_REGISTRY}/api:${TAG}
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__hackathondb
              value: "Host=postgres;Port=5432;Database=hackathondb;Username=postgres;Password=${POSTGRES_PASSWORD}"
            - name: ConnectionStrings__messaging
              value: "amqp://guest:${RABBITMQ_PASSWORD}@messaging:5672"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
